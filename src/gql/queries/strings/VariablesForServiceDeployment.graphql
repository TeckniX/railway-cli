query VariablesForServiceDeployment(
	$projectId: String!
	$environmentId: String!
	$serviceId: String!
) {
	variablesForServiceDeployment(
		projectId: $projectId
		environmentId: $environmentId
		serviceId: $serviceId
	)
}

query VariablesForServiceDeployment(
  $serviceId: String!
  $environmentId: String!
) {
  variables(
    serviceId: $serviceId
    environmentId: $environmentId
  ) {
    edges {
      node {
        name
        value
        isSealed
        references {
          name
          value
        }
      }
    }
  }
}